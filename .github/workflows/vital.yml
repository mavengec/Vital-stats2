name: Vital Rust stats

on:
  schedule:
    - cron: "0 */4 * * *"   # кожні 4 години (GitHub може трохи затримувати)
  workflow_dispatch: {}       # кнопка ручного запуску (для перевірки)

# дозвіл комітити оновлений state.json назад у репозиторій
permissions:
  contents: write

# щоб два запуски не накладались
concurrency:
  group: vital-stats
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Встановити залежності
        run: npm install

      - name: Встановити браузер Chromium та xvfb
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get install -y xvfb

      - name: Запуск трекера
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          THREAD_ID: ${{ vars.THREAD_ID }}
          STEAM_IDS: ${{ vars.STEAM_IDS }}
          SERVER_IDS: ${{ vars.SERVER_IDS }}
          MODE: ${{ vars.MODE }}
        run: xvfb-run -a node vital-playwright.mjs

      - name: Зберегти ID повідомлення (state.json)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "state.json без змін"
          fi

